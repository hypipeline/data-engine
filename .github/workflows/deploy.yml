name: Deploy to EC2

# Auto-deploys the Data Engine to the eu-west-1 t4g.large box on every push to main.
# Runs on the self-hosted runner installed ON that instance, so it needs no inbound
# SSH access — it just syncs the local clone and rebuilds the containers in place.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

# Never let two deploys clobber each other; queue them instead.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    steps:
      - name: Sync repo on server
        run: |
          set -euo pipefail
          cd "$HOME/data-engine"
          git fetch origin main
          git reset --hard origin/main
          echo "Now at: $(git rev-parse --short HEAD) — $(git log -1 --pretty=%s)"

      - name: Rebuild & restart containers
        run: |
          set -euo pipefail
          cd "$HOME/data-engine/mergr_db"
          # prod overlay adds the public domain + TLS + 80/443 to the single Caddy front door
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          # Caddyfile is a bind mount — a content change won't recreate the container, so
          # reload it explicitly (falls back to a restart if the admin API reload fails).
          docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T caddy \
            caddy reload --config /etc/caddy/Caddyfile 2>/dev/null \
            || docker compose -f docker-compose.yml -f docker-compose.prod.yml restart caddy
          docker image prune -f

      - name: Health check
        run: |
          set -euo pipefail
          cd "$HOME/data-engine/mergr_db"
          # api is internal-only now — check it inside the container network
          for i in $(seq 1 20); do
            if docker compose exec -T api python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)" 2>/dev/null; then
              echo "API healthy after ${i} attempt(s)"; exit 0
            fi
            sleep 3
          done
          echo "::error::API health check failed after redeploy"
          docker compose logs --tail=40 api
          exit 1
