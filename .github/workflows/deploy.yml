name: Deploy to EC2

# Auto-deploys the Data Engine to the eu-west-1 t4g.large box on every push to main.
# Runs on the self-hosted runner installed ON that instance, so it needs no inbound
# SSH access — it just syncs the local clone and rebuilds the containers in place.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

# Never let two deploys clobber each other; queue them instead.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    steps:
      - name: Sync repo on server
        run: |
          set -euo pipefail
          cd "$HOME/data-engine"
          git fetch origin main
          git reset --hard origin/main
          echo "Now at: $(git rev-parse --short HEAD) — $(git log -1 --pretty=%s)"

      - name: Rebuild & restart containers
        run: |
          set -euo pipefail
          cd "$HOME/data-engine/mergr_db"
          docker compose up -d --build
          docker image prune -f

      - name: Health check
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if curl -fs http://localhost:8000/health >/dev/null 2>&1; then
              echo "API healthy after ${i} attempt(s)"; exit 0
            fi
            sleep 3
          done
          echo "::error::API health check failed after redeploy"
          cd "$HOME/data-engine/mergr_db" && docker compose logs --tail=40 api
          exit 1
