<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- The Data Engine brand mark: the glowing green dot from the topbar (--accent-2 #26795f). -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#26795f" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#26795f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#26795f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#glow)"/>
  <circle cx="16" cy="16" r="7" fill="#26795f"/>
</svg>
