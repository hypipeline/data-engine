services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"               # host 5433 to avoid clashing with anything on 5432
    environment:
      POSTGRES_USER: mergr
      POSTGRES_PASSWORD: mergr
      POSTGRES_DB: mergr
    volumes:
      - mergr_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergr -d mergr"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot loader. Run:  docker compose run --rm loader
  loader:
    build: .
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mergr:mergr@db:5432/mergr
      DATA_DIR: /data
      # LIMIT: "500"              # uncomment for a quick smoke test
    volumes:
      - ..:/data:ro              # project root holds mergr_investors/ companies/ transactions/
    command: ["python", "import.py"]

  # One-shot gap analysis -> writes mergr_missing_*.txt into the project root.
  gap:
    build: .
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mergr:mergr@db:5432/mergr
      OUT_DIR: /data
    volumes:
      - ..:/data                 # read-write: this service writes the queue files
    command: ["python", "gap_analysis.py"]

  # Entity-lookup (Data Engine "entity" source) — the ORIGINAL Python app (FastAPI).
  # INTERNAL ONLY: no host port. Reachable solely through the Caddy front door at
  # /entity-app/* and by api/web at http://entity:8000/. (php/ is legacy reference.)
  entity:
    build: ../sources/entity/app
    restart: unless-stopped
    env_file:
      - entity.secrets.env   # ANTHROPIC/OPENAI/BROWSERBASE/CH keys (gitignored)
    environment:
      PYTHONUNBUFFERED: "1"          # stream pipeline progress to docker logs
      ENTITY_USE_BROWSER: "${ENTITY_USE_BROWSER:-0}"  # 1 = enable slow Browserbase register scrapers
    volumes:
      - entity_reports:/app/reports   # keep rendered report JSON across restarts

  # Streamlit dashboard — INTERNAL; served via Caddy at "/".
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mergr:mergr@db:5432/mergr
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENTITY_BASE_URL: http://entity:8000
      ENTITY_PUBLIC_BASE: ${ENTITY_PUBLIC_BASE:-/entity-app}   # same-origin path via Caddy

  # FastAPI JSON API — INTERNAL; served via Caddy under /mergr, /entity, /health, /docs.
  api:
    build: .
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mergr:mergr@db:5432/mergr
      API_USER: ${API_USER:-mergr}
      API_PASS: ${API_PASS:-mergr}
      ENTITY_BASE_URL: http://entity:8000

  # THE single front door. Everything is reached through this one port — the dashboard,
  # the API, and the entity app (at /entity-app/*). Nothing else is published to the host.
  # Local: http://localhost:8080 (site ":80"). Prod overlays domain + TLS via docker-compose.prod.yml.
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [api, web, entity]
    environment:
      CADDY_SITE_ADDRESS: "${CADDY_SITE_ADDRESS:-:80}"
      ACME_EMAIL: "${ACME_EMAIL:-noreply@hyndlandpartners.com}"
    ports:
      - "${DE_HTTP_PORT:-8088}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mergr_pgdata:
  entity_reports:
  caddy_data:
  caddy_config:
